<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MOTHER Terminal</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="screen">
    <div id="crt-lines"></div>
    <div id="bleed"></div>

    <div id="boot-screen">
        <div id="boot-logo"></div>
        <div id="boot-sub">AN SM-LINK PRODUCT</div>
        <div id="boot-bar-wrap">
            <div id="boot-bar"></div>
        </div>
        <div id="boot-copyright">(C) SM-LINK DATA SYSTEMS</div>
    </div>

    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt"></span>
            <input
                id="command-input"
                autocomplete="off"
                autofocus
            >
        </div>
    </div>
</div>

<audio id="boot-sound" src="audio/boot.mp3" preload="auto"></audio>
<audio id="type-sound" src="audio/type.mp3" preload="auto" loop></audio>

<script type="module" src="js/app.js"></script>

</body>
</html>
